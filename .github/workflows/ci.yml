# ────────────────────────────────────────────────────────────────────
# CI Workflow — build and verify on push and pull request
# ────────────────────────────────────────────────────────────────────
# Releases are performed locally via prepare-release.sh which builds,
# deploys to Nexus, tags, and merges. This workflow provides CI
# verification only.
# ────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build and verify
        run: mvn clean verify -B
